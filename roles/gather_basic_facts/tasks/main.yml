---
- name: Gather necessary facts
  ansible.builtin.setup:
    gather_subset:
    - distribution
    - distribution_release
    - os_family
  tags:
    - always
- name: Print the host's OS distribution 📌
  ansible.builtin.debug:
    msg: |
      "The distribution is: {{ ansible_distribution }}"
      "The distribution release is: {{ ansible_distribution_release }}"
      "The os family is: {{ ansible_os_family }}"