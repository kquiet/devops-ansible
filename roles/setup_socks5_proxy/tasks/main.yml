---
- name: "Run OS check"
  ansible.builtin.include_role:
    name: devops.utils.assert_run_in_os
  vars:
    required_os_families:
    - "Debian"
- name: "Ensure openssh-client is installed"
  ansible.builtin.include_role:
    name: devops.utils.try_apt_install
  vars:
    try_apt_packages:
    - openssh-client
- name: Configure systemd service file
  ansible.builtin.template:
    src: ssh_socks5_proxy.j2
    dest: /etc/systemd/system/ssh_socks5_proxy.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart socks5 proxy
- name: Reload systemd, enable, and start the service
  ansible.builtin.systemd_service:
    name: ssh_socks5_proxy.service
    daemon_reload: true
    enabled: true
    state: started