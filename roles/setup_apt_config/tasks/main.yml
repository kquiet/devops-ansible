---
- name: "Run OS check"
  ansible.builtin.include_role:
    name: devops.utils.assert_run_in_os
  vars:
    required_os_families:
    - "Debian"
- name: Configure APT proxy for internal hosts
  when: "'internal' in group_names"
  ansible.builtin.template:
    src: 95-proxies.j2
    dest: /etc/apt/apt.conf.d/95-proxies
    owner: root
    group: root
    mode: '0644'
- name: Configure custom APT User-Agent
  ansible.builtin.template:
    src: 99-custom-user-agent.j2
    dest: /etc/apt/apt.conf.d/99-custom-user-agent
    owner: root
    group: root
    mode: '0644'
- name: Ensure automatic upgrades and updates are disabled
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/20auto-upgrades
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - regexp: '^APT::Periodic::Update-Package-Lists'
      line: 'APT::Periodic::Update-Package-Lists "0";'
    - regexp: '^APT::Periodic::Download-Upgradeable-Packages'
      line: 'APT::Periodic::Download-Upgradeable-Packages "0";'
    - regexp: '^APT::Periodic::AutocleanInterval'
      line: 'APT::Periodic::AutocleanInterval "0";'
    - regexp: '^APT::Periodic::Unattended-Upgrade'
      line: 'APT::Periodic::Unattended-Upgrade "0";'